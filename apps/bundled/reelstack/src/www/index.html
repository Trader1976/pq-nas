<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Reel Stack</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <link rel="stylesheet" href="/static/theme.css">
  <link rel="stylesheet" href="app.css">
    <link rel="stylesheet" href="reelstack_search.css">
<script src="/static/theme.js"></script>
  <link rel="stylesheet" href="reelstack_context_menu.css">
</head>
<body>
  <main class="rsApp">
    <header class="rsTop">
      <div class="rsBrand">
        <img src="icon.svg" alt="">
        <div>
          <h1>Reel Stack</h1>
          <p>Video gallery for DNA-Nexus Server <span id="rsManifestVersion" class="rsVersionBadge" aria-label="App version"></span></p>
        </div>
      </div>

      <div class="rsActions">
        <label class="rsViewModeLabel" for="viewModeSelect">
          <span class="rsViewModeLabelText">View</span>
          <select id="viewModeSelect" class="rsInput rsSelect">
            <option value="all">All videos</option>
            <option value="folders">By folder</option>
            <option value="recent_added">Recently added</option>
            <option value="recent_watched">Recently watched</option>
            <option value="favorites">Favorites</option>
            <option value="unrated">Unrated</option>
            <option value="missing_thumbnails">Missing thumbnails</option>
          </select>
        </label>
        <input id="filterInput" class="rsInput" type="search" placeholder="Filter videos…">
                <button id="searchBtn" class="rsBtn" type="button" title="Open search">Search</button>
<button id="scanBtn" class="rsBtn primary" type="button">Refresh index</button>
      </div>
    </header>

    <section class="rsStatus">
      <span id="statusText">Ready.</span>
      <span id="countText">0 videos</span>
    </section>

    <section id="grid" class="rsGrid"></section>

    <div id="emptyState" class="rsEmpty">
      <h2>No videos loaded yet</h2>
      <p>Click <b>Refresh index</b> to search your files for movies and video clips.</p>
    </div>
  </main>

  <div id="playerModal" class="rsModal" hidden>
    <div class="rsModalCard">
      <div class="rsModalHead">
        <div>
          <strong id="playerTitle">Video</strong>
          <div id="playerPath" class="rsMuted"></div>
        </div>
        <button id="closePlayerBtn" class="rsBtn" type="button">Close</button>
      </div>
      <video id="player" controls playsinline></video>
    </div>
  </div>  <script src="reelstack_search.js"></script>  <script src="reelstack_manifest.js"></script>



  <script src="app.js"></script>
  <script src="reelstack_context_menu.js"></script>
</body>
</html>
