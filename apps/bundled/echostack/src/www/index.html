<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>DNA-Nexus • Echo Stack</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./fulltext_search.css">
  <link rel="stylesheet" href="./background.css">
</head>
<body>
  <div class="shell">
    <header class="top">
      <div>
        <div class="eyebrow">DNA-Nexus</div>
        <h1>Echo Stack <span id="appVersion" class="appVersion"></span></h1>
        <p>Save links, notes, tags, and research trails on your own NAS.</p>
      </div>
      <div class="badge">Save the signal before it fades.</div>
    </header>

    <section class="composer">
      <div class="row">
        <input id="urlInput" type="url" placeholder="https://example.com/article">
        <button id="saveBtn" type="button">Save link</button>
      </div>

      <div class="grid2">
        <input id="titleInput" type="text" placeholder="Optional title">
        <input id="collectionInput" type="text" placeholder="Collection, e.g. NAS docs">
      </div>

      <div class="grid1">
        <input id="tagsInput" type="text" placeholder="Tags, e.g. nas, crypto, research">
      </div>

      <textarea id="notesInput" placeholder="Notes"></textarea>
      <div id="status" class="status">Ready.</div>
    </section>

    <section class="toolbar">
      <input id="searchInput" type="search" placeholder="Search links, notes, tags, collections">
      <button id="viewModeBtn" type="button">Grid view</button>
      <button id="refreshBtn" type="button">Refresh</button>
    </section>

    <section class="deepSearch" id="deepSearchPanel">
      <div class="deepSearchTop">
        <div class="deepSearchTitleBlock">
          <h2>Deep Search</h2>
          <p>Search inside archived page snapshots, not just link titles and tags.</p>
        </div>
        <button id="deepReindexAllBtn" type="button" title="Build or refresh the Deep Search index for pages that have already been archived. Saved links that are not archived yet will be skipped." aria-label="Index archived pages for Deep Search">Re-index archives</button>
      </div>
      <div class="deepSearchRow">
        <input id="deepSearchInput" type="search" placeholder="Example: muscle gain in 50s">
        <button id="deepSearchBtn" type="button" title="Search inside the saved text of archived pages. This finds words from page content, not only titles, tags, or notes." aria-label="Search inside archived page text">Deep Search</button>
      </div>
      <div id="deepSearchStatus" class="deepSearchStatus">Type a phrase to search inside archived page text.</div>
      <div id="deepSearchResults" class="deepSearchResults"></div>
    </section>

    <main id="items" class="items"></main>
  </div>

  <template id="itemTemplate">
    <article class="item">
      <div class="itemMain">
        <div class="itemTitle"></div>
        <a class="itemUrl" href="#" target="_blank" rel="noopener noreferrer"></a>
        <div class="itemMeta"></div>
        <textarea class="itemNotes" placeholder="Notes"></textarea>
      </div>
      <div class="itemActions">
        <button class="favBtn" type="button"></button>
        <button class="readBtn" type="button"></button>
        <button class="saveItemBtn" type="button">Save</button>
        <button class="deleteBtn danger" type="button">Delete</button>
      </div>
    </article>
  </template>

  <script src="./fulltext_search.js"></script>
  <script src="./app.js"></script>
</body>
</html>
