<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0e1a2f"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Folder body -->
  <path d="M6 18
           L22 18
           L26 14
           H58
           a4 4 0 0 1 4 4
           V50
           a4 4 0 0 1 -4 4
           H6
           a4 4 0 0 1 -4 -4
           V22
           a4 4 0 0 1 4 -4
           Z"
        fill="url(#bg)"
        stroke="#00f0ff"
        stroke-width="2.2"
        filter="url(#glow)"/>

  <!-- Inner highlight -->
  <path d="M8 24 H56 V48 H8 Z"
        fill="#00f0ff"
        opacity="0.08"/>

  <!-- Tech lines -->
  <path d="M14 30 H34
           M14 36 H40
           M14 42 H28"
        stroke="#00f0ff"
        stroke-width="1.4"
        stroke-linecap="round"
        opacity="0.7"/>

  <!-- Small accent dots -->
  <circle cx="44" cy="34" r="1.5" fill="#00f0ff" filter="url(#glow)"/>
  <circle cx="50" cy="38" r="1.5" fill="#00f0ff" filter="url(#glow)"/>

</svg>
