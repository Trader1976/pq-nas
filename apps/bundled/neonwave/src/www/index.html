<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>DNA-Nexus • NeonWave</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/theme.css">
    <link rel="stylesheet" href="./app.css">
    <script src="/static/theme.js"></script>
</head>
<body>
<div class="musicApp">
    <header class="topbar">
        <div>
            <h1>NeonWave</h1>
            <div class="sub">Browse, scan, queue and play your audio library</div>
        </div>

        <div class="topActions">
            <button id="musicFolderBtn" class="pillBtn" type="button">Music folder</button>
            <button id="favoritesBtn" class="pillBtn" type="button">Favorites</button>
            <button id="scanBtn" class="pillBtn" type="button">Scan audio</button>

            <label class="toggle">
                <input id="audioOnlyToggle" type="checkbox" checked>
                <span>Audio only</span>
            </label>

            <button id="refreshBtn" class="pillBtn" type="button">Refresh</button>
        </div>
    </header>

    <main class="mainGrid">
        <section class="panel libraryPanel">
            <div class="panelHead">
                <div>
                    <div class="panelTitle">Library</div>
                    <div id="pathLine" class="pathLine">/</div>
                </div>
                <button id="upBtn" class="pillBtn small" type="button">Up</button>
            </div>

            <div class="librarySearchBox">
                <div class="librarySearchInputWrap">
                    <span class="librarySearchIcon">⌕</span>
                    <input id="librarySearch" class="librarySearchInput" type="search"
                           placeholder="Search current folder or scanned results…"
                           autocomplete="off" spellcheck="false">
                    <button id="librarySearchDeep" class="librarySearchDeep" type="button" title="Deep scan from current folder">Deep</button>
                    <button id="librarySearchClear" class="librarySearchClear" type="button" title="Clear search">×</button>
                </div>
                <div id="librarySearchCount" class="librarySearchCount">0</div>
            </div>

            <div id="librarySearchEmpty" class="empty librarySearchEmpty" hidden>No matching tracks, folders or cover images.</div>

            <div id="statusLine" class="statusLine">Loading…</div>
            <div id="list" class="list"></div>
        </section>

        <aside class="panel playerPanel">
            <div class="nowPlaying">
                <div id="nowCover" class="cover"><span>♪</span></div>
                <div class="nowText">
                    <div id="nowTitle" class="nowTitle">Nothing playing</div>
                    <div id="nowSub" class="nowSub">Choose an audio file</div>
                </div>
            </div>

            <audio id="audio" controls preload="metadata"></audio>
            <div class="transportBar">
                <button id="prevBtn" class="pillBtn small" type="button">Prev</button>
                <button id="nextBtn" class="pillBtn small" type="button">Next</button>

                <label class="toggle transportToggle">
                    <input id="shuffleToggle" type="checkbox">
                    <span>Shuffle</span>
                </label>

                <button id="repeatBtn" class="pillBtn small" type="button" data-mode="off">Repeat: off</button>
            </div>

            <div class="playlistBox">
                <div class="playlistHead">
                    <div class="panelTitle">Playlists</div>
                    <button id="playlistNewBtn" class="pillBtn small" type="button">New</button>
                </div>

                <div class="playlistControls">
                    <select id="playlistSelect" class="playlistSelect"></select>
                    <input id="playlistNameInput" class="playlistNameInput" type="text" placeholder="Playlist name">
                </div>

                <div class="playlistActions">
                    <button id="playlistSaveQueueBtn" class="pillBtn small" type="button">Save queue</button>
                    <button id="playlistLoadBtn" class="pillBtn small" type="button">Load</button>
                    <button id="playlistDeleteBtn" class="pillBtn small dangerSoft" type="button">Delete</button>
                </div>

                <div id="playlistStatus" class="playlistStatus">Playlists are stored in this browser.</div>
            </div>
            <div class="vizBox">
                <div class="vizHead">
                    <div class="panelTitle">Visualizer</div>
                    <select id="vizStyle" class="vizSelect">
                        <option value="bars">Neon bars</option>
                        <option value="wave">Waveform</option>
                        <option value="rings">Pulse rings</option>
                        <option value="off">Off</option>
                    </select>
                </div>

                <canvas id="vizCanvas" class="vizCanvas"></canvas>
            </div>
            <div class="eqBox">
                <div class="eqHead">
                    <div class="panelTitle">Equalizer</div>
                    <label class="eqPower">
                        <input id="eqEnabled" type="checkbox" checked>
                        <span>On</span>
                    </label>
                </div>

                <div class="eqControls">
                    <select id="eqPreset" class="eqPreset"></select>
                    <button id="eqResetBtn" class="pillBtn small" type="button">Reset</button>
                </div>

                <div id="eqGrid" class="eqGrid"></div>
            </div>


            <div class="queueHead">
                <div class="panelTitle">Queue</div>
                <button id="clearQueueBtn" class="pillBtn small" type="button">Clear</button>
            </div>

            <div id="queueList" class="queueList"></div>
        </aside>
    </main>
</div>

<script src="./neonwave_search.js"></script>
<script src="./neonwave_favorites.js"></script>
<script src="./app.js"></script>
<script src="./playlists.js"></script>
</body>
</html>
