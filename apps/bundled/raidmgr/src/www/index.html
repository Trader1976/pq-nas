<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>PQ-NAS • Storage Manager</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <!-- Use PQ-NAS global themes -->
    <link rel="stylesheet" href="/static/theme.css">
    <script src="/static/theme.js"></script>

    <style>
        * { box-sizing: border-box; }

        :root{
            --raid-accent: rgba(var(--info-rgb, 0,140,255), 0.65);
            --raid-arrow: rgba(var(--info-rgb, 0,140,255), 0.85);
            --raid-arrow-soft: rgba(var(--info-rgb, 0,140,255), 0.45);

            --raid-bg: var(--panel);
            --raid-mid: rgba(var(--fg-rgb), 0.06);
            --raid-border: var(--border);
        }

        html, body { height: 100%; }

        body{
            margin: 0;
            color: var(--fg);
            font-family: var(--sans);
            background: var(--bg);
            overflow: hidden;
        }

        .wrap{
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
        }

        .panel{
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 18px;
            background: rgba(0,0,0,0.18);
        }

        .bar{
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.10);
            background: rgba(0,0,0,0.14);
        }

        .left{
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .title{
            font-weight: 950;
            letter-spacing: 0.2px;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sub{
            font-size: 12px;
            opacity: 0.75;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .actions{
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn{
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(0,0,0,0.18);
            color: var(--fg);
            font-weight: 850;
            cursor: pointer;
            user-select: none;
            box-shadow: none;
        }

        .btn:hover{
            border-color: rgba(255,255,255,0.22);
            background: rgba(255,255,255,0.06);
        }

        .btn.secondary{
            opacity: 0.9;
        }

        .btn.danger{
            background: var(--fail, var(--err, #dc322f)) !important;
            color: #fff !important;
            border: 1px solid rgba(var(--fail-rgb, 220,50,47), 0.55) !important;
            box-shadow: none !important;
        }

        .btn.danger:hover{
            filter: brightness(1.08);
        }

        .btn.danger:active{
            filter: brightness(0.98);
        }

        .btn:disabled{
            opacity: 1 !important;
            cursor: not-allowed !important;
            pointer-events: none !important;
            filter: none !important;
            box-shadow: none !important;
        }

        .btn.danger:disabled{
            background: rgba(128,128,128,0.35) !important;
            color: rgba(255,255,255,0.72) !important;
            border: 1px solid rgba(180,180,180,0.28) !important;
        }

        html[data-theme="win_classic"] .btn.danger{
            border-color: rgba(0,0,0,0.35) !important;
        }

        html[data-theme="win_classic"] .btn.danger:disabled{
            background: #d8d8d8 !important;
            color: #666 !important;
            border-color: rgba(0,0,0,0.22) !important;
        }

        .badge{
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 850;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(0,0,0,0.18);
            white-space: nowrap;
        }

        .badge.ok{
            border-color: rgba(0,255,200,0.22);
            background: rgba(0,255,200,0.08);
        }

        .badge.warn{
            border-color: rgba(255,200,0,0.22);
            background: rgba(255,200,0,0.10);
        }

        .badge.err{
            border-color: rgba(255,80,80,0.22);
            background: rgba(255,80,80,0.10);
        }

        .badge.info{
            border-color: rgba(0,140,255,0.22);
            background: rgba(0,140,255,0.10);
        }

        .main{
            flex: 1 1 auto;
            min-height: 0;
            overflow: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            justify-content: flex-start !important;
            align-items: stretch;
        }

        #raidTab,
        #poolsTab{
            flex: 1 1 auto;
            min-height: 0;
        }

        #poolsTab{
            width: 100%;
        }

        #poolsOut{
            width: 100%;
            margin-top: 0 !important;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card{
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            background: rgba(0,0,0,0.16);
            padding: 12px;
        }

        .card h3{
            margin: 0 0 8px 0;
            font-size: 13px;
            font-weight: 950;
            letter-spacing: 0.2px;
        }

        .row{
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .formGrid3{
            display: grid;
            grid-template-columns: 1fr 220px 1.2fr;
            gap: 10px;
            align-items: start;
        }

        .formField .k{
            margin-bottom: 6px;
        }

        .formField input,
        .formField select{
            width: 100%;
            min-height: 44px;
            padding: 10px 12px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(0,0,0,0.18);
            color: var(--fg);
        }

        .formHelp{
            margin-top: 6px;
            font-size: 12px;
            opacity: .75;
            min-height: 16px;
        }

        @media (max-width: 860px){
            .formGrid3{
                grid-template-columns: 1fr;
            }
        }

        .k{
            opacity: 0.70;
            font-weight: 850;
            min-width: 130px;
        }

        .v{
            font-family: var(--sans);
            opacity: 0.92;
            overflow-wrap: anywhere;
        }

        pre{
            margin: 0;
            padding: 10px 12px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(0,0,0,0.22);
            overflow: auto;
            max-height: 46vh;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: var(--mono);
            font-size: 12px;
            line-height: 1.35;
        }

        #rawOut,
        #progressOut,
        #actionOut,
        #confirmPre{
            font-family: var(--mono);
        }

        #userStatus{
            font-family: var(--sans);
        }

        .pbarWrap{
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        .pbarRow{
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .pbarMeta{
            font-size: 12px;
            opacity: 0.85;
            font-family: var(--mono);
        }

        .pill{
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(0,0,0,0.14);
            font-size: 12px;
            font-weight: 850;
            white-space: nowrap;
        }

        .pill.ok{
            border-color: rgba(0,255,200,0.22);
            background: rgba(0,255,200,0.08);
        }

        .pill.warn{
            border-color: rgba(255,200,0,0.22);
            background: rgba(255,200,0,0.10);
        }

        .pill.err{
            border-color: rgba(255,80,80,0.22);
            background: rgba(255,80,80,0.10);
        }

        .pbar{
            width: 100%;
            height: 12px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(0,0,0,0.18);
            overflow: hidden;
        }

        .pbarFill{
            height: 100%;
            width: 0%;
            border-radius: 999px;
            background: var(--accent, rgba(0,140,255,0.85));
            transition: width 160ms ease;
        }

        body.theme-dark,
        body.dark{
            --raid-bg: rgba(0,0,0,0.12);
            --raid-mid: rgba(0,0,0,0.18);
            --raid-border: rgba(255,255,255,0.14);
        }

        body.embedded .wrap{
            padding: 0;
        }

        body.embedded .panel{
            border: 0;
            border-radius: 0;
            background: transparent;
        }

        body.embedded .bar{
            border-bottom: 1px solid rgba(255,255,255,0.10);
            border-radius: 0;
        }

        #tabRaidBtn[aria-pressed="true"],
        #tabPoolsBtn[aria-pressed="true"]{
            border-color: rgba(var(--info-rgb, 0,140,255), 0.55);
            background: rgba(var(--info-rgb, 0,140,255), 0.14);
            box-shadow: 0 0 0 1px rgba(var(--info-rgb, 0,140,255), 0.10) inset;
        }

        html[data-theme="win_classic"],
        body.theme-win_classic,
        body.win_classic{
            --toast-bg: rgba(246,246,246,0.96);
            --toast-border: rgba(0,0,0,0.22);
            --toast-fg: rgba(0,0,0,0.92);
            --toast-shadow: 0 10px 26px rgba(0,0,0,0.18);
        }

        #poolsTab > .card{
            background: transparent !important;
            border: 0 !important;
            padding: 0 !important;
        }

        #poolsTab > .card > h3{
            margin: 0 0 10px 0 !important;
        }

        .pqDriveSvgGrid{
            cursor: pointer;
        }

        .pqDriveSvgTile{
            cursor: pointer;
        }

        .pqDriveSvgTile:hover{
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.35);
        }
    </style>
</head>

<body>
<div class="wrap">
    <div class="panel">
        <div class="bar">
            <div class="left">
                <div class="title" id="titleLine">Storage Manager</div>
                <div class="sub" id="subLine">Manage storage pools</div>
            </div>

            <div class="actions">
                <span class="badge warn" id="badge">loading…</span>
                <button class="btn secondary" id="helpBtn" type="button">Help</button>
                <button class="btn secondary" id="refreshBtn" type="button">Refresh</button>
            </div>
        </div>

        <div class="main">
            <div id="poolsTab">
                <div id="poolsOut"></div>
            </div>
        </div>
    </div>
</div>

<script src="./app.js"></script>
</body>
</html>
