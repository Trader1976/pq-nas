<script>
    (function(){
        const timeEl = document.getElementById('clockTime');
        const dateEl = document.getElementById('clockDate');

        function pad(n){
            return String(n).padStart(2, '0');
        }

        function clockLocale(){
            const api = window.PQNAS_I18N;
            const lang = api && typeof api.getLanguage === 'function' ? api.getLanguage() : '';
            if (lang === 'fi') return 'fi-FI';
            if (lang === 'en') return 'en-GB';
            return undefined;
        }

        function updateClock(){
            const now = new Date();

            const hh = pad(now.getHours());
            const mm = pad(now.getMinutes());
            const ss = pad(now.getSeconds());
            timeEl.textContent = `${hh}:${mm}:${ss}`;

            const dateText = now.toLocaleDateString(clockLocale(), {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            dateEl.textContent = dateText;
        }

        if (window.PQNAS_I18N && typeof window.PQNAS_I18N.ready === 'function') {
            window.PQNAS_I18N.ready().then(() => {
                window.PQNAS_I18N.apply(document);
                updateClock();
            }).catch(updateClock);
        }

        window.addEventListener('pqnas-language-changed', () => {
            if (window.PQNAS_I18N && typeof window.PQNAS_I18N.apply === 'function') {
                window.PQNAS_I18N.apply(document);
            }
            updateClock();
        });

        updateClock();
        setInterval(updateClock, 1000);
    })();
</script>
