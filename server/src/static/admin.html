<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>DNA-Nexus NAS</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; }

        body{
            margin: 0;
            color: var(--fg);
            font-family: var(--sans);
            background:
                    radial-gradient(1200px 700px at 18% 8%, rgba(var(--fg-rgb),0.11), transparent 55%),
                    radial-gradient(1000px 700px at 82% 12%, rgba(var(--fg-rgb),0.07), transparent 60%),
                    linear-gradient(180deg, #04050f, var(--bg));
            overflow: hidden;
        }

        a{ color: var(--fg); text-decoration: none; }
        a:hover{ text-shadow: 0 0 10px rgba(var(--fg-rgb),0.25); }

        .desktop{
            height: 100%;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 14px;
            padding: 14px;
        }

        @media (max-width: 980px){
            body{ overflow:auto; }
            .desktop{
                grid-template-columns: 1fr;
                overflow: visible;
            }
        }

        .sidebar{
            border: 1px solid var(--border);
            border-radius: var(--radius2);
            background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0.24));
            box-shadow: var(--shadow);
            padding: 14px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .brand{
            display:flex;
            gap: 10px;
            align-items: center;
            padding: 10px 10px 14px;
            border-bottom: 1px solid var(--border2);
            margin-bottom: 12px;
        }

        .brand .logoDot{
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--fg);
            box-shadow: 0 0 18px rgba(var(--fg-rgb),0.38);
            flex: 0 0 auto;
        }

        .brand h1{
            margin: 0;
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 0.2px;
        }

        .brand .sub{
            margin-top: 2px;
            font-size: 12px;
            color: var(--fg-dim);
        }

        .nav{
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px 6px;
            overflow: auto;
            min-height: 0;
        }

        .navAlertBadge{
            margin-left: 10px;
            width: 18px;
            height: 18px;
            border-radius: 999px;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: 950;
            font-size: 12px;
            line-height: 1;
            color: rgba(255,255,255,0.98);
            border: 1px solid rgba(var(--fail-rgb),0.75);
            background: rgba(var(--fail-rgb),0.22);
            box-shadow: 0 0 18px rgba(var(--fail-rgb),0.25);
        }

        .navbtn.needs-attn{
            border-color: rgba(var(--fail-rgb),0.55);
            background: rgba(var(--fail-rgb),0.08);
            box-shadow: 0 0 18px rgba(var(--fail-rgb),0.18);
        }

        .navbtn.needs-attn:hover{
            border-color: rgba(var(--fail-rgb),0.70);
            background: rgba(var(--fail-rgb),0.12);
        }

        .nav .sectionLabel{
            margin: 10px 6px 2px;
            font-size: 11px;
            color: rgba(var(--fg-rgb),0.55);
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }

        .navbtn{
            display:flex;
            align-items:center;
            justify-content: space-between;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 14px;
            border: 1px solid var(--border2);
            background: rgba(0,0,0,0.22);
            color: var(--fg);
            cursor: pointer;
            user-select:none;
            text-decoration:none;
            transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
        }

        .navbtn:hover{
            transform: translateY(-1px);
            background: rgba(var(--fg-rgb),0.06);
            border-color: rgba(var(--fg-rgb),0.30);
        }

        .navbtn.active{
            background: rgba(var(--fg-rgb),0.10);
            border-color: rgba(var(--fg-rgb),0.38);
            box-shadow: 0 0 18px rgba(var(--fg-rgb),0.12);
        }

        .navbtn .k{
            font-size: 12px;
            color: rgba(var(--fg-rgb),0.55);
            border: 1px solid rgba(var(--fg-rgb),0.16);
            border-radius: 10px;
            padding: 2px 8px;
            background: rgba(0,0,0,0.22);
        }

        .bottom{
            border-top: 1px solid var(--border2);
            margin-top: auto;
            padding-top: 12px;
            display:flex;
            flex-direction: column;
            gap: 10px;
        }

        .statusCard{
            border: 1px solid var(--border2);
            border-radius: 16px;
            background: rgba(0,0,0,0.22);
            padding: 10px 12px;
        }

        .badge{
            display:inline-flex;
            align-items:center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            border: 1px solid var(--border2);
            background: rgba(0,0,0,0.28);
            color: var(--fg);
            white-space: nowrap;
        }

        .badge.admin { border-color: rgba(var(--fg-rgb),0.30); background: rgba(var(--fg-rgb),0.08); }
        .badge.user { border-color: rgba(var(--info-rgb),0.22); background: rgba(var(--info-rgb),0.10); color: rgba(var(--info-rgb),0.92); }
        .badge.unknown { border-color: rgba(var(--fg-rgb),0.14); background: rgba(255,255,255,0.03); color: rgba(var(--fg-rgb),0.80); }

        .mini{
            margin-top: 8px;
            font-size: 12px;
            color: var(--fg-dim);
            line-height: 1.35;
        }

        .workspace{
            border: 1px solid var(--border);
            border-radius: var(--radius2);
            background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.30));
            box-shadow: var(--shadow);
            display:flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
        }

        .content{
            flex: 1 1 auto;
            min-width: 0;
            min-height: 0;
            padding: 18px;
            display: flex;
            align-items: flex-start;
            justify-content: flex-end;
        }

        .clockWrap{
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            text-align: right;
            user-select: none;
        }

        .clockTime{
            font-size: clamp(28px, 4.5vw, 60px);
            line-height: 0.95;
            font-weight: 950;
            letter-spacing: 1.5px;
            color: rgba(var(--fg-rgb),0.96);
            text-shadow:
                    0 0 18px rgba(var(--fg-rgb),0.10),
                    0 0 36px rgba(var(--fg-rgb),0.06);
        }

        .clockDate{
            margin-top: 6px;
            font-size: clamp(10px, 1.2vw, 16px);
            line-height: 1.2;
            font-weight: 700;
            letter-spacing: 0.4px;
            color: rgba(var(--fg-rgb),0.70);
        }

        .footerline{
            padding: 10px 14px;
            border-top: 1px solid var(--border2);
            color: rgba(var(--fg-rgb),0.55);
            font-size: 12px;
            text-align: right;
            user-select: none;
            background: rgba(0,0,0,0.12);
        }

        @media (max-width: 980px){
            .content{
                justify-content: center;
                align-items: center;
                padding: 24px 16px;
            }

            .clockWrap{
                align-items: center;
                text-align: center;
            }
        }
    </style>

    <link rel="stylesheet" href="/static/theme.css">
    <script src="/static/theme.js"></script>
</head>

<body>
<div class="desktop">
    <aside class="sidebar">
        <div class="brand">
            <div class="logoDot" aria-hidden="true"></div>
            <div style="min-width:0">
                <h1>Admin</h1>
                <div class="sub">server-gated • static UI</div>
            </div>
        </div>

        <nav class="nav" aria-label="Admin navigation">
            <div class="sectionLabel">Admin</div>
            <a class="navbtn active" href="/admin">
                <span>Overview</span><span class="k">O</span>
            </a>
            <a class="navbtn" href="/admin/users">
                <span>User profiles</span><span class="k">U</span>
            </a>
            <a class="navbtn" href="/admin/approvals">
                <span>Approvals</span><span class="k">A</span>
            </a>
            <a class="navbtn" href="/admin/apps">
                <span>Apps</span><span class="k">📦</span>
            </a>
            <a class="navbtn" href="/admin/audit">
                <span>Audit log UI</span><span class="k">D</span>
            </a>
            <a class="navbtn" href="/admin/settings">
                <span>Settings</span><span class="k">S</span>
            </a>
            <a class="navbtn" href="/system">
                <span>System</span><span class="k">Y</span>
            </a>
            <div class="sectionLabel"> </div>
            <a class="navbtn" href="/app">
                <span>Back...</span><span class="k">↩</span>
            </a>
        </nav>

        <div class="bottom">
            <div class="statusCard">
                <div id="roleBadge" class="badge unknown">role: ?</div>
                <div class="mini" id="sidebarHint">
                    Manage users, review audit logs, and verify server integrity.
                </div>
            </div>
        </div>
    </aside>

    <main class="workspace">
        <div class="content">
            <section class="clockWrap" aria-label="Clock">
                <div id="clockTime" class="clockTime">--:--:--</div>
                <div id="clockDate" class="clockDate">----</div>
            </section>
        </div>

        <div class="footerline">© CPUNK 2026</div>
    </main>
</div>

<script src="/static/admin_badges.js"></script>
<script>
    (function(){
        const timeEl = document.getElementById('clockTime');
        const dateEl = document.getElementById('clockDate');

        function pad(n){
            return String(n).padStart(2, '0');
        }

        function updateClock(){
            const now = new Date();

            const hh = pad(now.getHours());
            const mm = pad(now.getMinutes());
            const ss = pad(now.getSeconds());
            timeEl.textContent = `${hh}:${mm}:${ss}`;

            const dateText = now.toLocaleDateString(undefined, {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            dateEl.textContent = dateText;
        }

        updateClock();
        setInterval(updateClock, 1000);
    })();
</script>
</body>
</html>
